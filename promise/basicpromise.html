    <!-- PROMISE BASIC EXAMPLES--->
    <!-- //A promise may have one of three states.
     1.Pending
    2.Fulfilled
    3.Rejected 
     
    If the promise returns successfully, the resolve() function is called. And, if an error occurs, the reject() function is called.
    
    You can perform an operation after a promise is resolved using methods then(), catch() and finally().

    1.The then() method is used with the callback when the promise is successfully fulfilled or resolved.

   2.The catch() method is used with the callback when the promise is rejected or if an error occurs.
    -->

    <!-- JavaScript-ல் Promise என்பது நேரம் எடுத்துக் கொள்ளும் operations-ஐ (asynchronous operations) handle செய்ய பயன்படுகிறது.
    ஒரு Promise return ஆகும்போது, அதற்குள் success ஆகும் (resolve) அல்லது failure ஆகும் (reject) என்பதைக் கண்டுபிடிக்கலாம்.
    
    ✅ resolve() மற்றும் ❌ reject()
    1️⃣ resolve(value) → Operation வெற்றியடையும்போது (Success) resolve() function அழைக்கப்படும்.
    2️⃣ reject(error) → Operation தோல்வியடையும்போது (Failure/Error) reject() function அழைக்கப்படும்.

    Method Description
    then() Promise resolve (✅ success) ஆன பிறகு ஒரு function execute செய்யப்படும்.
    catch() Promise reject (❌ failure/error) ஆன பிறகு error-ஐ handle செய்ய பயன்படும்.
    finally() Promise resolve ஆகினாலும், reject ஆகினாலும் எப்போதும் நடக்கும்.

    🚀 Promises-ஐ then(), catch(), finally() ஆகியவற்றுடன் சேர்த்து பயன்படுத்தினால், asynchronous operations-ஐ எளிதாக
    handle செய்யலாம்! 😊 -->
